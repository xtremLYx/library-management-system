<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#151b2c" />
    </linearGradient>

    <!-- Accent Border / Sparkle Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Book Cover Gradient -->
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Page Gradients -->
    <linearGradient id="pageGradLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="85%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#d1d5db" />
    </linearGradient>
    <linearGradient id="pageGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1d5db" />
      <stop offset="15%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Ribbon Gradient -->
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Subtle Blur for Book Shadow -->
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle App Icon Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="4" filter="url(#dropShadow)" />

  <!-- Outer Ring Highlight (Subtle Glassmorphism inner shadow look) -->
  <rect x="38" y="38" width="436" height="436" rx="94" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1" />

  <!-- Floating Book Shadow -->
  <ellipse cx="256" cy="405" rx="160" ry="16" fill="#000000" opacity="0.5" filter="url(#shadowBlur)" />

  <!-- 3D Book Base / Pages Thickness Block -->
  <!-- Left Side Thickness -->
  <path d="M 64,352 L 64,360 C 94,370 174,400 252,385 L 252,377 C 174,392 94,362 64,352 Z" fill="#9ca3af" />
  <!-- Right Side Thickness -->
  <path d="M 448,352 L 448,360 C 418,370 338,400 260,385 L 260,377 C 338,392 418,362 448,352 Z" fill="#9ca3af" />

  <!-- Book Hard Cover -->
  <path d="M 256,156 C 170,171 90,141 60,131 L 60,351 C 90,361 170,391 256,376 C 342,391 422,361 452,351 L 452,131 C 422,141 342,171 256,156 Z" fill="url(#coverGrad)" filter="url(#dropShadow)" />

  <!-- Book Pages Spine Shadow (gives depth to the fold) -->
  <path d="M 250,154 L 262,154 L 262,372 L 250,372 Z" fill="#1e1b4b" opacity="0.3" />

  <!-- Left Page Page Block -->
  <path d="M 68,137 C 98,147 173,177 250,162 L 250,368 C 173,383 98,353 68,343 Z" fill="url(#pageGradLeft)" />

  <!-- Right Page Page Block -->
  <path d="M 444,137 C 414,147 339,177 262,162 L 262,368 C 339,383 414,353 444,343 Z" fill="url(#pageGradRight)" />

  <!-- Bookmark Ribbon -->
  <path d="M 246,162 L 246,396 L 256,384 L 266,396 L 266,162 Z" fill="url(#ribbonGrad)" />

  <!-- Stylized Lines of Text on Left Page (Subtle) -->
  <path d="M 96,190 C 120,198 170,214 216,206" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 96,230 C 120,238 170,254 216,246" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 96,270 C 120,278 170,294 216,286" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 96,310 C 120,318 170,334 216,326" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />

  <!-- Stylized Lines of Text on Right Page (Subtle) -->
  <path d="M 296,206 C 342,214 392,198 416,190" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 296,246 C 342,254 392,238 416,230" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 296,286 C 342,294 392,278 416,270" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 296,326 C 342,334 392,318 416,310" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25" />

  <!-- Glowing Sparkle Stars (Magical/Smart concept) -->
  <!-- Center Star -->
  <path d="M 256,56 Q 256,76 276,76 Q 256,76 256,96 Q 256,76 236,76 Q 256,76 256,56 Z" fill="url(#glowGrad)" filter="url(#neonGlow)" />
  <!-- Left Star -->
  <path d="M 136,74 Q 136,86 148,86 Q 136,86 136,98 Q 136,86 124,86 Q 136,86 136,74 Z" fill="url(#glowGrad)" filter="url(#neonGlow)" />
  <!-- Right Star -->
  <path d="M 376,74 Q 376,86 388,86 Q 376,86 376,98 Q 376,86 364,86 Q 376,86 376,74 Z" fill="url(#glowGrad)" filter="url(#neonGlow)" />

  <!-- Small floating sparkles -->
  <circle cx="180" cy="74" r="3.5" fill="#a78bfa" opacity="0.8" />
  <circle cx="332" cy="74" r="4" fill="#60a5fa" opacity="0.8" />
  <circle cx="216" cy="100" r="2.5" fill="#ec4899" opacity="0.7" />
  <circle cx="296" cy="100" r="3" fill="#a78bfa" opacity="0.7" />
</svg>